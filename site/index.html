<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sides — Run lines, anywhere</title>
    <meta name="description" content="The rehearsal app for actors. Practice your lines.">
    <meta property="og:title" content="Sides — Run lines, anywhere">
    <meta property="og:description" content="The rehearsal app for actors. Practice your lines.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://getsides.app">
    <meta name="twitter:card" content="summary">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%AD%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #FAF7F2;
            color: #2D2A26;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 64px 24px 48px;
            max-width: 480px;
            margin: 0 auto;
            text-align: center;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 80px;
            height: 80px;
        }

        .wordmark {
            font-size: 72px;
            font-weight: 800;
            letter-spacing: -3px;
            line-height: 1;
        }

        .tagline {
            margin-top: 12px;
            font-size: 19px;
            color: #9B9590;
            letter-spacing: -0.2px;
        }

        .description {
            margin-top: 36px;
            font-size: 17px;
            line-height: 1.65;
            max-width: 380px;
        }

        .coming-soon {
            margin-top: 44px;
            font-size: 14px;
            font-weight: 600;
            color: #9B9590;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .app-store-badge {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            margin-top: 12px;
            padding: 12px 28px 12px 20px;
            background: #111;
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            opacity: 0.35;
            pointer-events: none;
        }

        .app-store-badge svg { flex-shrink: 0; }

        .badge-text {
            text-align: left;
            line-height: 1.15;
        }

        .badge-text small {
            display: block;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        .badge-text span {
            font-size: 19px;
            font-weight: 600;
            letter-spacing: -0.4px;
        }

        footer {
            padding: 24px;
            text-align: center;
            font-size: 13px;
            color: #9B9590;
        }

        footer a {
            color: #9B9590;
            text-decoration: none;
        }

        footer a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            main { padding: 48px 24px 40px; }
            .logo { width: 84px; height: 84px; }
            .tagline { font-size: 22px; }
            .description { font-size: 20px; max-width: none; }
            .coming-soon { font-size: 15px; }
            .badge-text span { font-size: 22px; }
            .badge-text small { font-size: 12px; }
            .app-store-badge { padding: 16px 36px 16px 26px; gap: 11px; }
            .app-store-badge svg { width: 24px; height: 28px; }
        }

        @media (max-width: 360px) {
            .logo { width: 68px; height: 68px; }
            .wordmark { font-size: 56px; letter-spacing: -2px; }
            .tagline { font-size: 19px; }
            .description { font-size: 18px; }
        }
    </style>
</head>
<body>
    <main>
        <div class="brand">
            <img class="logo" src="logo.svg" alt="" aria-hidden="true">
            <h1 class="wordmark">sides</h1>
        </div>
        <p class="tagline">Run lines, anywhere.</p>
        <p class="description">
            Practice scenes on your own.<br>
            No scene partner needed.
        </p>
        <p class="coming-soon">Coming soon</p>
        <span class="app-store-badge">
            <svg width="20" height="24" viewBox="0 0 18 22" fill="white" aria-hidden="true">
                <path d="M14.94 11.41c-.02-2.67 2.18-3.95 2.28-4.01-1.24-1.82-3.17-2.07-3.86-2.1-1.64-.17-3.21.97-4.04.97-.84 0-2.14-.95-3.51-.92-1.81.03-3.47 1.05-4.4 2.67-1.87 3.25-.48 8.07 1.35 10.7.89 1.29 1.96 2.74 3.35 2.69 1.34-.05 1.85-.87 3.48-.87 1.62 0 2.08.87 3.5.84 1.45-.02 2.36-1.32 3.24-2.61 1.02-1.5 1.44-2.95 1.47-3.03-.03-.01-2.82-1.08-2.85-4.3zM12.26 3.73c.74-.9 1.24-2.14 1.1-3.38-1.07.04-2.36.71-3.13 1.61-.69.8-1.29 2.07-1.13 3.29 1.19.09 2.4-.6 3.16-1.52z"/>
            </svg>
            <div class="badge-text">
                <small>Download on the</small>
                <span>App Store</span>
            </div>
        </span>
    </main>
    <footer>
        <a href="mailto:hello@getsides.app">hello@getsides.app</a>
    </footer>
</body>
</html>
